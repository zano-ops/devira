<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1E3A5F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>DevisPro BTP</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('root').innerHTML =
          '<div style="padding:24px;background:#1E3A5F;min-height:100vh;font-family:Arial;color:white">' +
          '<h2 style="color:#fbbf24">⚠️ Erreur au démarrage</h2>' +
          '<pre style="background:#0f2040;padding:16px;border-radius:8px;white-space:pre-wrap;color:#fbbf24;font-size:13px">' +
          msg + '\n' + src + ':' + line + '</pre>' +
          '<p style="color:#93c5fd">Copie ce texte et envoie-le</p></div>';
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
